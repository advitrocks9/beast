name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  checks:
    name: ${{ matrix.task }}
    runs-on: ubuntu-latest
    timeout-minutes: 12
    strategy:
      fail-fast: false
      matrix:
        task: [typecheck-web, typecheck-workers]

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck web (pnpm --filter @beast/web typecheck)
        if: matrix.task == 'typecheck-web'
        run: pnpm --filter @beast/web typecheck

      - name: Typecheck workers (pnpm --filter @beast/workers typecheck)
        if: matrix.task == 'typecheck-workers'
        run: pnpm --filter @beast/workers typecheck
